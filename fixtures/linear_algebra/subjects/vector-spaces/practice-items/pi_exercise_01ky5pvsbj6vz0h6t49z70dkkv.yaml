prompt: "Show that\n\n$\\frac{-1+\\sqrt{3}i}{2}$\n\nis a cube root of 1 (meaning
  that its cube equals 1)"
expected_answer: "Let\n\n$$z=\\frac{-1+\\sqrt{3}i}{2}.$$\n\nFirst compute\n\n$$z^2=\\\
  frac{(-1+\\sqrt{3}i)^2}{4}=\\frac{1-2\\sqrt{3}i+3i^2}{4}=\\frac{-2-2\\sqrt{3}i}{4}=\\\
  frac{-1-\\sqrt{3}i}{2},$$\n\nwhere $i^2=-1$. Therefore\n\n$$z^3=z^2z=\\frac{(-1-\\\
  sqrt{3}i)(-1+\\sqrt{3}i)}{4}.$$\n\nThe numerator is a product of conjugates, so\n\
  \n$$(-1-\\sqrt{3}i)(-1+\\sqrt{3}i)=(-1)^2-(\\sqrt{3}i)^2=1-3i^2=4.$$\n\nThus\n\n\
  $$z^3=\\frac{4}{4}=1,$$\n\nso $\\frac{-1+\\sqrt{3}i}{2}$ is a cube root of $1$."
difficulty: 0.35
