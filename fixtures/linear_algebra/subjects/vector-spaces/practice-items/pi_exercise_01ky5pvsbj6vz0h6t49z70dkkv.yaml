hints:
  - Let the given complex number be $z$. To verify the claim directly, compute 
    $z^3$ using complex multiplication.
  - Begin by finding $z^2$. Expand $(-1+\sqrt{3}i)^2$ and replace $i^2$ with 
    $-1$.
  - Multiply your expression for $z^2$ by $z$. The two numerators form a product
    of complex conjugates, which simplifies using $(a-bi)(a+bi)=a^2+b^2$.
