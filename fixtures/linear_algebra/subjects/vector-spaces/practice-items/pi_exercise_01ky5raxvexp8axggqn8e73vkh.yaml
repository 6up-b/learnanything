prompt: Find two distinct square roots of 𝑖
expected_answer: "Let \\(z=a+bi\\), where \\(a,b\\in\\mathbb R\\). Then\n\\[\nz^2=(a^2-b^2)+2ab\\\
  ,i.\n\\]\nFor \\(z^2=i\\), equating real and imaginary parts gives\n\\[\na^2-b^2=0,\\
  qquad 2ab=1.\n\\]\nThe first equation implies \\(b=\\pm a\\). Since \\(2ab=1>0\\
  ), \\(a\\) and \\(b\\) have the same sign, so \\(b=a\\). Thus \\(2a^2=1\\), giving
  \\(a=\\pm 1/\\sqrt2\\), with the same sign for \\(b\\).\n\nTherefore the two distinct
  square roots are\n\\[\n\\boxed{\\frac{1+i}{\\sqrt2}\\quad\\text{and}\\quad-\\frac{1+i}{\\\
  sqrt2}}.\n\\]\nIndeed, squaring either number gives \\(i\\)."
difficulty: 0.35
difficulty_source: llm_estimate
tags: []
hints:
  - Write an unknown square root as \(a+bi\), with \(a\) and \(b\) real.
  - Expand \((a+bi)^2\) using \(i^2=-1\), then compare its real and imaginary 
    parts with those of \(i\).
  - Use the resulting real-part equation to relate \(a\) and \(b\), and use the 
    sign of their product to choose the correct relation.
  - After finding one root, recall that its additive inverse has the same 
    square.
