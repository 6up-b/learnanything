      quote: "This is something I'll go into much more detail on later,\ndescribing
        the exact relationship between different coordinate systems,\nbut for right
        now, I just want you to appreciate the fact that any time we\ndescribe vectors
        numerically, it depends on an implicit choice of what basis\nvectors we're
