        reader_citation:ext_01KY3VMAQ2JGYG900ZH3HTET4R:lo_from_linear_combinations_to_a_basis:s124-s134
      path: 
        canonical-sources/raw/sha256-427978a30dcb7d1f8e31662626f36cdddd466d5f605fdee0018bdad337bf51c1
      locator: span:ext_01KY3VMAQ2JGYG900ZH3HTET4R/s124
      quote: "it unlocks access to every possible three-dimensional vector.\nOne way
        I like to think about this is that as you scale that new third vector,\nit
        moves around that span sheet of the first two, sweeping it through all of
        space.\nAnother way to think about it is that you're making full use of the
        three freely changing\nscalars that you have at your disposal to access the
        full three dimensions of space.\nNow, in the case where the third vector was
        already sitting on the span of the first two,\nor the case where two vectors
        happen to line up,\nwe want some terminology to describe the fact that at
        least one of these vectors is\nredundant, not adding anything to our span.\n\
        Whenever this happens, where you have multiple vectors and you could remove
        one without\nreducing the span, the relevant terminology is to say that they
        are linearly dependent."
      quote_hash: 
        sha256:888acce0908269fd480c6b8889a282f9c2ddd8f934f69700111e80847a0ebc47
      source_id: src_01KY3VMAEVKJ1F8PMFW8Q6VSAS
