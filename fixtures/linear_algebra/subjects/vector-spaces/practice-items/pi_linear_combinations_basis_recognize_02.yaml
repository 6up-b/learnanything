        it's called a linear combination of those two vectors.\nWhere does this word
        linear come from?\nWhy does this have anything to do with lines?\nWell, this
        isn't the etymology, but one way I like to think about it\nis that if you
        fix one of those scalars and let the other one change its value freely,"
