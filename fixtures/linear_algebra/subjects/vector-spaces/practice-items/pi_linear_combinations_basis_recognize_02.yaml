      quote: "as a linear combination of the others, since it's already in the span
        of the others.\nOn the other hand, if each vector really does add another
        dimension to the span,\nthey're said to be linearly independent.\nSo with
        all of that terminology, and hopefully with some good mental\nimages to go
        with it, let me leave you with a puzzle before we go.\nThe technical definition
        of a basis of a space is a\nset of linearly independent vectors that span
        that space.\nNow, given how I described a basis earlier, and given your current
        understanding of the\nwords span and linearly independent, think about why
        this definition would make sense.\nIn the next video, I'll get into matrices
        in transforming space. See you then!"
