      quote: "the tip of the resulting vector is limited to just this single line
        passing through the\norigin.\nActually, technically there's a third possibility
        too.\nBoth your vectors could be zero, in which case you'd just be stuck at
        the origin.\nHere's some more terminology.\nThe set of all possible vectors
        that you can reach with a linear combination\nof a given pair of vectors is
        called the span of those two vectors.\nSo restating what we just saw in this
        lingo, the span of most\npairs of 2D vectors is all vectors of 2D space, but
        when they line up,\ntheir span is all vectors whose tip sit on a certain line.\n\
        Remember how I said that linear algebra revolves"
      quote_hash: 
        sha256:db7caf56d7422cf53de3ae51ad25059209dd35055eb12015107f40f3a3443dde
      source_id: src_01KY3VMAEVKJ1F8PMFW8Q6VSAS
