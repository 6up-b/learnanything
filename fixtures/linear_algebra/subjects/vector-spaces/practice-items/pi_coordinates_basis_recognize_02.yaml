      locator: span:ext_01KY3VMAQ2JGYG900ZH3HTET4R/s9
      quote: "meaning, think about how each one stretches or squishes vectors.\nIn
        the xy coordinate system, there are two very special vectors,\nthe one pointing
        to the right with length 1, commonly called i-hat,\nor the unit vector in
        the x direction, and the one pointing straight up with length 1,\ncommonly
        called j-hat, or the unit vector in the y direction.\nNow, think of the x
        coordinate of our vector as a scalar that scales i-hat,\nstretching it by
        a factor of 3, and the y coordinate as a scalar that scales j-hat,\nflipping
        it and stretching it by a factor of 2.\nIn this sense, the vector that these
        coordinates\ndescribe is the sum of two scaled vectors.\nThat's a surprisingly
        important concept, this idea of adding together two scaled vectors."
