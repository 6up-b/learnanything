      quote: "between pairs of numbers and two-dimensional vectors,\nbut the association
        is definitely different from the one that you get using the more\nstandard
        basis of i-hat and j-hat.\nThis is something I'll go into much more detail
        on later,\ndescribing the exact relationship between different coordinate
        systems,\nbut for right now, I just want you to appreciate the fact that any
        time we\ndescribe vectors numerically, it depends on an implicit choice of
        what basis\nvectors we're using.\nSo any time that you're scaling two vectors
        and adding them like this,\nit's called a linear combination of those two
        vectors.\nWhere does this word linear come from?\nWhy does this have anything
        to do with lines?\nWell, this isn't the etymology, but one way I like to think
        about it\nis that if you fix one of those scalars and let the other one change
        its value freely,"
