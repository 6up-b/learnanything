  - id: facet_coordinates_are_scalar_coefficients_relative_to_
    title:
    aliases:
      - basis dependence of coordinates
    description:
    tags: []
    concept_id: concept_basis_relative_coordinates
    kind: interpretation
    claim: Coordinates are scalar coefficients relative to an ordered basis, so 
      changing the basis can change a vector's coordinate list without changing 
      the underlying vector or vector space.
    preconditions:
      - An ordered basis has been chosen.
      - A vector is expressed as a linear combination of the basis vectors.
    postconditions:
      - Each coordinate is interpreted as the coefficient of its corresponding 
        basis vector.
      - Different bases may assign different coordinate lists to the same 
        vector.
    applicability:
      - Interpreting numerical vector coordinates and comparing coordinate 
        systems.
    positive_examples:
      - In the standard plane basis, (3,-2) means three times the first basis 
        vector plus negative two times the second.
    negative_examples:
      - Treating a coordinate pair as having an absolute geometric meaning 
        without a basis.
    non_goals:
      - This facet does not supply a change-of-basis algorithm.
    error_signatures:
      - Identifying a vector with one particular coordinate list.
      - Using coordinates without specifying or assuming their ordered basis.
    instructional_repairs:
      - State the ordered basis before interpreting coordinates.
      - Separate the underlying vector from its basis-dependent description.
