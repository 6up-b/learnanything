  - id: facet_when_the_symbol_0_is_overloaded_its_surrounding_
    title:
    aliases:
      - typed zero notation
      - context-dependent zero
    description:
    tags: []
    concept_id: concept_zero_vector
    kind: interpretation
    claim: When the symbol 0 is overloaded, its surrounding operation and 
      ambient types determine whether it denotes scalar zero or the zero vector;
      in x+0 with x in F^n, it denotes the zero vector because vector addition 
      takes two elements of F^n.
    preconditions:
      - The symbol 0 occurs in a typed mathematical expression.
      - The domains of the surrounding operations are known.
    postconditions:
      - The intended zero is selected consistently with the expression’s types.
    applicability:
      - Reading 0=(0,...,0).
      - Interpreting x+0=x in F^n.
    positive_examples:
      - The left side of 0=(0,...,0) is a vector, while each right-side entry is
        a scalar.
    negative_examples:
      - Interpreting x+0 as vector-plus-scalar addition when no such operation 
        has been defined.
    non_goals:
      - This facet does not define a new operation between vectors and scalars.
    error_signatures:
      - Assuming every occurrence of 0 has the same mathematical type.
      - Ignoring the domain of vector addition.
    instructional_repairs:
      - Identify the type of every surrounding term before interpreting 0.
      - Choose the meaning that makes the defined operation well-typed.
