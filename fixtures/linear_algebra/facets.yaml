  - id: facet_two_lists_are_equal_exactly_when_they_have_the_s
    title:
    aliases:
      - equality of lists
      - tuple equality
    description:
    tags: []
    concept_id: concept_finite_ordered_lists
    kind: applicability_condition
    claim: Two lists are equal exactly when they have the same length and equal 
      entries in the same positions; unlike sets, lists preserve order and 
      repetitions.
    preconditions:
      - Both compared objects are lists.
    postconditions:
      - List equality is decided by length and position-by-position comparison.
    applicability:
      - Comparing tuples or coordinate lists.
      - Distinguishing list equality from set equality.
    positive_examples:
      - (3,5) equals (3,5).
    negative_examples:
      - (3,5) does not equal (5,3).
      - (4,4) does not equal (4,4,4).
    non_goals:
      - This is not a criterion for equality of sets.
    error_signatures:
      - Ignoring order when comparing lists.
      - Discarding repeated entries.
      - Failing to compare list lengths.
    instructional_repairs:
      - Compare lengths first, then compare entries at each matching position.
      - Do not apply set-style equality rules to parenthesized lists.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_166f95c90318c11a
