  - id: facet_a_vector_space_is_a_set_with_addition_and_scalar
    title:
    aliases:
      - vector-space definition
      - vector-space laws
    description:
    tags: []
    concept_id: concept_vector_space
    kind: definition
    claim: A vector space is a set with addition and scalar multiplication 
      satisfying commutativity of addition, associativity of vector addition and
      scalar multiplication, existence of an additive identity and additive 
      inverses, the scalar identity law, and distributivity over vector and 
      scalar addition.
    preconditions:
      - A set has specified addition and scalar multiplication operations.
      - The scalars belong to the relevant scalar system.
    postconditions:
      - The structure is a vector space exactly when all listed axioms hold.
    applicability:
      - Recognizing or verifying abstract vector-space structure.
    positive_examples:
      - Check each axiom for all relevant vectors and scalars.
    negative_examples:
      - Concluding that a set is a vector space after checking only closure or 
        commutativity.
    non_goals:
      - The definition does not require a norm, inner product, basis, dimension,
        or geometric realization.
    error_signatures:
      - Omitting one distributive law.
      - Confusing the scalar identity 1 with the additive identity 0.
      - Checking the axioms only for selected examples rather than universally.
    instructional_repairs:
      - Group the checks into addition laws, scalar-action laws, identity and 
        inverse laws, and the two distributive laws.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_3bcfc7adc55e3e14
