  - id: facet_a_list_of_length_n_is_a_finite_ordered_collectio
    title:
    aliases:
      - list
      - n-tuple
    description:
    tags: []
    concept_id: concept_finite_ordered_lists
    kind: definition
    claim: A list of length n is a finite ordered collection of elements, where 
      n is a nonnegative integer; the length-zero case is the empty list.
    preconditions:
      - n is a nonnegative integer.
    postconditions:
      - Every list has a finite length.
      - Each entry has a position.
      - The empty list is included as the case n=0.
    applicability:
      - Interpreting tuples and coordinate lists.
      - Determining whether an ordered object qualifies as a list.
    positive_examples:
      - (x,y) is a list of length two.
      - () is a list of length zero.
    negative_examples:
      - An infinitely long sequence-like object is not a list under this 
        definition.
    non_goals:
      - This definition does not include infinite sequences.
    error_signatures:
      - Treating an infinite sequence as a finite list.
      - Assuming every list contains at least one entry.
    instructional_repairs:
      - Verify that the proposed length is a finite nonnegative integer.
      - Include the empty list when considering the n=0 boundary case.
