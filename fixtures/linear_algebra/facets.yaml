      - Writing the zero vector in coordinates.
    positive_examples:
      - In F^3, the zero vector is (0,0,0).
    negative_examples:
      - A list containing a nonzero coordinate is not the zero vector.
    non_goals:
      - The vector zero and scalar zero are not the same type of object.
    error_signatures:
      - Using a zero list of the wrong length.
      - Treating the vector zero as a scalar.
    instructional_repairs:
      - Match the number of zero coordinates to n.
      - Distinguish the whole list from each scalar entry.
