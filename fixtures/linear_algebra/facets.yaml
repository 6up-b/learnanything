  - id: facet_to_add_two_elements_of_f_n_align_equal_coordinat
    title:
    aliases:
      - coordinatewise vector addition
    description:
    tags: []
    concept_id: concept_coordinatewise_addition
    kind: procedure_contract
    claim: To add two elements of F^n, align equal coordinate indices, add each 
      scalar pair x_k and y_k in F, and return the length-n list 
      (x_1+y_1,...,x_n+y_n).
    preconditions:
      - Both operands belong to the same F^n.
      - Scalar addition is defined in F.
    postconditions:
      - The result has length n.
      - The kth coordinate of the result is x_k+y_k.
    applicability:
      - Computing sums of coordinate vectors.
      - Expanding vector addition in a coordinate proof.
    positive_examples:
      - (x_1,x_2)+(y_1,y_2)=(x_1+y_1,x_2+y_2).
    negative_examples:
      - Pairing x_1 with y_2.
      - Returning a list of a different length.
    non_goals:
      - This procedure does not define scalar multiplication.
    error_signatures:
      - Adding coordinates with different indices.
      - Omitting, reordering, or duplicating a coordinate.
    instructional_repairs:
      - Label corresponding positions before adding.
      - Check that the output retains exactly n entries in the original order.
