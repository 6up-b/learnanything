  - id: facet_for_functions_with_a_common_domain_and_scalar_va
    title:
    aliases:
      - pointwise function-space operations
    description:
    tags: []
    concept_id: concept_function_space
    kind: procedure_contract
    claim: For functions with a common domain and scalar-valued outputs, vector 
      addition and scalar multiplication are defined pointwise by adding 
      function values or scaling each function value at every input.
    preconditions:
      - The functions share a domain.
      - Their outputs lie in the relevant scalar field.
    postconditions:
      - The resulting rule defines another function on the same domain.
      - Vector-space properties can be checked input by input.
    applicability:
      - Treating collections of scalar-valued functions as candidate vector 
        spaces.
    positive_examples:
      - (f+g)(x)=f(x)+g(x).
      - A scalar multiple evaluated at x equals the scalar times f(x).
    negative_examples:
      - Function composition used in place of vector addition.
      - Multiplication of two functions used in place of scalar multiplication.
    non_goals:
      - Pointwise vector-space operations do not define function composition.
    error_signatures:
      - Adding functions by adding their inputs.
      - Scaling only selected outputs.
      - Rejecting functions as vectors because they lack a finite 
        coordinate-list appearance.
    instructional_repairs:
      - Choose an arbitrary input x and define the new function through its 
        value at x.
      - Check closure and each axiom pointwise.
    status: reviewed
    version: 1
