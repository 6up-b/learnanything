  - id: facet_to_prove_a_vector_identity_in_f_n_by_coordinates
    title:
    aliases:
      - componentwise proof procedure
    description:
    tags: []
    concept_id: concept_coordinate_proofs_in_f_n
    kind: procedure_contract
    claim: To prove a vector identity in F^n by coordinates, represent the 
      vectors as coordinate lists, expand the vector operations by definition, 
      apply the appropriate scalar fact at every coordinate, and recognize the 
      resulting list as the target vector expression.
    preconditions:
      - The vectors belong to F^n.
      - The relevant vector operations have coordinate definitions.
      - The required scalar property is available.
    postconditions:
      - The target vector identity is established by equality of corresponding 
        coordinates.
    applicability:
      - Proving commutativity of addition in F^n.
      - Other vector identities whose operations are defined coordinatewise.
    positive_examples:
      - Expand x+y, commute every scalar sum, and reassemble the result as y+x.
    negative_examples:
      - Citing the vector theorem being proved to justify the scalar-coordinate 
        step.
    non_goals:
      - Coordinates need not be introduced when a simpler coordinate-free proof 
        is available.
    error_signatures:
      - Skipping the definition-expansion step.
      - Applying a scalar law to whole vectors without justification.
      - Failing to reassemble the coordinate list as the target vector 
        expression.
    instructional_repairs:
      - Label each equality by either a vector-operation definition or a scalar 
        property.
      - Verify that every coordinate undergoes the same justified 
        transformation.
