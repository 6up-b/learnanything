  - id: facet_to_construct_a_vector_sum_geometrically_in_two_d
    title:
    aliases:
      - tip-to-tail vector addition
    description:
    tags: []
    concept_id: concept_geometric_interpretation_of_vectors
    kind: procedure_contract
    claim: To construct a vector sum geometrically in two dimensions, translate 
      the second arrow so its initial point meets the first arrow's endpoint, 
      then draw the sum from the first arrow's initial point to the translated 
      arrow's endpoint.
    preconditions:
      - Both vectors are represented as arrows in two dimensions.
      - Parallel translation preserves the represented vector.
    postconditions:
      - The resultant arrow represents the vector sum.
    applicability:
      - Geometric interpretation of two-dimensional vector addition.
    positive_examples:
      - Use an unchanged translated copy of the second vector in a tip-to-tail 
        construction.
    negative_examples:
      - Changing the second arrow's length or direction during translation.
      - Drawing the resultant between the wrong endpoints.
    non_goals:
      - This is not the general computational method for spaces that cannot be 
        visualized.
    error_signatures:
      - Joining the wrong endpoints.
      - Rotating or rescaling the translated arrow.
    instructional_repairs:
      - Mark the first tail, shared tip-tail junction, and final endpoint before
        drawing the resultant.
