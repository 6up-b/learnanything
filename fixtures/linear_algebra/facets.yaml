  - id: facet_vector_addition_must_be_commutative_and_associat
    title:
    aliases:
      - vector-space axiom checklist
    description:
    tags: []
    concept_id: concept_vector_space_axioms
    kind: proposition
    claim: Vector addition must be commutative and associative, possess an 
      additive identity and additive inverses, while scalar multiplication must 
      be associative, respect scalar 1, and satisfy both distributive laws.
    preconditions:
      - Addition and scalar multiplication are defined on the candidate set.
    postconditions:
      - A structure satisfying every listed law meets the algebraic requirements
        in the vector-space definition.
    applicability:
      - Verifying whether specified operations make a set into a vector space.
    positive_examples:
      - Checking componentwise sequence operations coordinate by coordinate.
    negative_examples:
      - Verifying only closure or only some of the listed laws.
    non_goals:
      - The checklist does not prescribe what the vectors must look like.
    error_signatures:
      - Omitting one distributive law.
      - Confusing the scalar identity 1 with the additive identity vector 0.
      - Assuming commutativity of scalar multiplication with vectors is an 
        axiom.
    instructional_repairs:
      - 'Organize verification by the complete axiom families: addition, identity
        and inverse, scalar identity and associativity, and distributivity.'
      - Keep scalar operations distinct from vector operations.
