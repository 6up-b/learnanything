  - id: facet_a_vector_space_is_a_set_equipped_with_addition_a
    title:
    aliases:
      - abstract vector-space definition
    description:
    tags: []
    concept_id: concept_vector_space
    kind: definition
    claim: A vector space is a set equipped with addition and scalar 
      multiplication whose operations satisfy the vector-space axioms; its 
      elements are called vectors or points and need not be geometric arrows.
    preconditions:
      - A set and candidate addition and scalar multiplication operations are 
        specified.
    postconditions:
      - The objects may be treated as vectors when the required axioms hold.
      - Results derived from the vector-space axioms apply independently of the 
        concrete form of the objects.
    applicability:
      - Recognizing abstract and concrete vector spaces.
    positive_examples:
      - The one-element space {0}.
      - Spaces of scalar sequences.
      - Spaces of scalar-valued functions with pointwise operations.
    negative_examples:
      - A set with operations that fail one or more vector-space axioms.
    non_goals:
      - This claim does not assert that every set or every pair of operations 
        forms a vector space.
      - Vectors are not restricted to arrows or finite coordinate lists.
    error_signatures:
      - Rejecting functions as vectors solely because they are not geometric 
        arrows.
      - Calling a set a vector space without specifying and checking its 
        operations.
    instructional_repairs:
      - Identify the elements, addition, and scalar multiplication before 
        applying the axiom checklist.
      - Separate the abstract vector-space structure from any particular 
        representation of its elements.
