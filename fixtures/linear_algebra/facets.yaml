  - id: facet_add_complex_numbers_componentwise_a_bi_c_di_a_c_
    title:
    aliases:
      - componentwise complex addition
    description:
    tags: []
    concept_id: concept_complex_addition
    kind: procedure_contract
    claim: 'Add complex numbers componentwise: (a + bi) + (c + di) = (a + c) + (b
      + d)i.'
    preconditions:
      - Both addends are written in a + bi form.
      - Their coefficients are real numbers.
    postconditions:
      - The real coefficients have been added together.
      - The imaginary coefficients have been added together.
      - The result is in standard complex-number form.
    applicability:
      - Adding two complex numbers in standard form.
    positive_examples:
      - (2 + 3i) + (4 + 5i) = 6 + 8i
    negative_examples:
      - (a + bi) + (c + di) = (a + b) + (c + d)i
    non_goals:
      - This rule does not define complex multiplication.
    error_signatures:
      - Combining a real component with an imaginary coefficient.
      - Dropping the imaginary unit from the result.
    instructional_repairs:
      - Align the real components and the coefficients of i as two separate 
        columns before adding.
