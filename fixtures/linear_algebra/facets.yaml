  - id: facet_multiply_complex_numbers_by_distributing_replaci
    title:
    aliases:
      - distributive complex multiplication
    description:
    tags: []
    concept_id: concept_complex_multiplication
    kind: procedure_contract
    claim: Multiply complex numbers by distributing, replacing i^2 with -1, 
      combining real and imaginary terms separately, and writing the result in a
      + bi form; equivalently, (a + bi)(c + di) = (ac - bd) + (ad + bc)i.
    preconditions:
      - Both factors are written in a + bi form.
      - The distributive property and i^2 = -1 are available.
    postconditions:
      - Every term has been distributed.
      - Occurrences of i^2 have been replaced by -1.
      - Real and imaginary terms have been combined separately.
      - The result is in standard complex-number form.
    applicability:
      - Multiplying two complex numbers in standard form.
    positive_examples:
      - (2 + 3i)(4 + 5i) = -7 + 22i
    negative_examples:
      - Treating i^2 as 1.
      - Combining real and imaginary terms as like terms.
    non_goals:
      - The closed formula need not be memorized independently of its 
        derivation.
    error_signatures:
      - Leaving i^2 unreduced.
      - Using ac + bd for the real component.
      - Failing to distribute one term across the opposite factor.
    instructional_repairs:
      - Expand as an ordinary binomial product, mark the i^2 term, replace it 
        with -1, and then collect the two component types.
    status: reviewed
    version: 1
