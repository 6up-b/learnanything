  - id: facet_for_x_and_y_in_f_n_coordinatewise_addition_is_co
    title:
    aliases:
      - coordinate proof of commutativity
    description:
    tags: []
    concept_id: concept_coordinate_vector_operations
    kind: proposition
    claim: 'For x and y in F^n, coordinatewise addition is commutative: x + y = y
      + x; a coordinate proof applies scalar commutativity separately in every coordinate.'
    preconditions:
      - x and y belong to F^n.
      - Vector addition in F^n is defined coordinatewise.
      - Addition in F is commutative.
    postconditions:
      - The coordinate calculation ends with y + x.
    applicability:
      - Proving commutativity of addition in a coordinate space.
    positive_examples:
      - Expand x and y into coordinate lists, reverse the scalar addends in each
        coordinate, and recognize y + x.
    negative_examples: []
    non_goals:
      - This does not prove commutativity for arbitrary operations called 
        addition.
    error_signatures:
      - Treating vector commutativity as already established instead of invoking
        scalar commutativity.
      - Reordering coordinates rather than reversing the two addends within each
        coordinate.
    instructional_repairs:
      - Label the coordinatewise-definition step and the scalar-commutativity 
        step separately.
