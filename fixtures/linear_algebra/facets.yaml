  - id: facet_scalar_calculations_over_r_or_c_use_commutative_
    title:
    aliases:
      - scalar laws
      - field arithmetic
    description:
    tags: []
    concept_id: concept_scalars_over_r_or_c
    kind: proposition
    claim: Scalar calculations over R or C use commutative and associative 
      addition and multiplication, additive and multiplicative identities, 
      additive inverses, nonzero multiplicative inverses, and distributivity of 
      multiplication over addition.
    preconditions:
      - The operands are scalars in the same choice of F.
      - A multiplicative inverse or division is used only for a nonzero scalar.
    postconditions:
      - Scalar expressions may be regrouped and reordered according to the 
        stated laws.
      - Subtraction and division can be interpreted through additive and 
        multiplicative inverses.
    applicability:
      - Justifying coordinatewise vector calculations.
      - Rewriting scalar expressions within a coordinate proof.
    positive_examples:
      - a+b=b+a for scalars a,b.
      - A nonzero complex scalar has a unique multiplicative inverse.
    negative_examples:
      - Dividing by the scalar zero.
    non_goals:
      - This facet does not assert these laws for arbitrary operations or 
        arbitrary algebraic systems.
    error_signatures:
      - Using a multiplicative inverse without checking that the scalar is 
        nonzero.
      - Invoking a vector property to justify a scalar-coordinate equality.
    instructional_repairs:
      - State the relevant scalar law at the coordinate where it is applied.
      - Check the nonzero condition before using division or a multiplicative 
        inverse.
    status: reviewed
    version: 1
