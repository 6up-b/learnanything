  - id: facet_if_x_x_1_x_n_belongs_to_f_n_then_x_k_is_the_kth_
    title:
    aliases:
      - kth coordinate
      - coordinate notation
    description:
    tags: []
    concept_id: concept_coordinate_space_f_n
    kind: interpretation
    claim: If x=(x_1,...,x_n) belongs to F^n, then x_k is the kth coordinate of 
      x for each index k from 1 through n.
    preconditions:
      - x belongs to F^n.
      - 1≤k≤n.
    postconditions:
      - A coordinate is identified by its position and index.
    applicability:
      - Reading indexed vector notation.
      - Aligning coordinates for componentwise operations.
    positive_examples:
      - In (x_1,x_2,x_3), x_2 is the second coordinate.
    negative_examples:
      - Calling x_k a coordinate when k lies outside 1,...,n.
    non_goals:
      - Explicit coordinates need not be introduced when a coordinate-free 
        argument is available.
    error_signatures:
      - Changing coordinate order.
      - Confusing the vector x with one scalar coordinate x_k.
    instructional_repairs:
      - Track both the ambient vector and the coordinate index.
      - Use subscripted notation only when coordinates are needed.
