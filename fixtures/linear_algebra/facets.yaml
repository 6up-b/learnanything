  - id: facet_a_real_number_a_is_identified_with_a_0i_while_i_
    title:
    aliases:
      - real numbers inside the complex numbers
      - imaginary-unit identity
    description:
    tags: []
    concept_id: concept_complex_numbers
    kind: interpretation
    claim: A real number a is identified with a + 0i, while i denotes 0 + 1i and
      satisfies i^2 = -1.
    preconditions:
      - The learner can read a complex number in a + bi form.
    postconditions:
      - The learner can regard real numbers as complex numbers with zero 
        imaginary coefficient.
      - The learner can simplify occurrences of i^2 to -1.
    applicability:
      - Embedding real numbers into the complex numbers.
      - Interpreting and simplifying expressions involving i.
    positive_examples:
      - 7 = 7 + 0i
      - i = 0 + 1i
      - i^2 = -1
    negative_examples:
      - Every complex number is real.
      - i^2 = 1.
    non_goals:
      - The identification of real numbers inside the complex numbers does not 
        make every complex number real.
    error_signatures:
      - Concluding that all complex numbers are real.
      - Replacing i^2 with 1 or leaving it unreduced during basic arithmetic.
    instructional_repairs:
      - 'Check the imaginary coefficient: a complex number is real exactly when that
        coefficient is zero.'
      - Replace i·i with -1 before combining real terms.
