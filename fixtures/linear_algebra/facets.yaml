    description:
    tags: []
    concept_id: concept_real_and_complex_vector_spaces
    kind: definition
    claim: A vector space is called real or complex according to whether its 
      scalar field is the real numbers or the complex numbers.
    preconditions:
      - The scalar field of the vector space is specified.
    postconditions:
      - The vector space can be classified by its allowed scalars.
    applicability:
      - Distinguishing real and complex vector spaces.
    positive_examples:
      - A space over real scalars is a real vector space.
      - A space over complex scalars is a complex vector space.
    negative_examples: []
    non_goals:
      - The classification does not change the underlying vector-space axiom 
        pattern.
    error_signatures:
      - Classifying a vector space without identifying its scalar field.
    instructional_repairs:
