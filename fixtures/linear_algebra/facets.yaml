  - id: facet_in_two_dimensions_multiplication_by_a_positive_s
    title:
    aliases:
      - geometric scaling of vectors
    description:
    tags: []
    concept_id: concept_geometric_interpretation_of_vectors
    kind: proposition
    claim: In two dimensions, multiplication by a positive scalar preserves 
      direction and scales length by that scalar, while multiplication by a 
      negative scalar reverses direction and scales length by the scalar's 
      absolute value.
    preconditions:
      - The vector is interpreted geometrically in two dimensions.
      - The sign of the scalar is known.
    postconditions:
      - The direction and length of the scalar multiple are determined from the 
        scalar's sign and absolute value.
    applicability:
      - Interpreting scalar multiplication geometrically.
    positive_examples:
      - A positive factor stretches or shrinks without reversing direction.
      - A negative factor reverses direction and scales length by its magnitude.
    negative_examples:
      - Applying the positive-scalar direction rule to a negative scalar.
    non_goals:
      - This geometric rule is not a replacement for the coordinate definition.
    error_signatures:
      - Using a negative length.
      - Failing to reverse direction for a negative scalar.
    instructional_repairs:
      - 'Handle sign and magnitude separately: sign determines direction; absolute
        value determines length scale.'
    status: reviewed
    version: 1
