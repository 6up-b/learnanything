  - id: facet_a_vector_space_is_a_set_with_operations_of_addit
    title:
    aliases:
      - informal characterization of a vector space
    description:
    tags: []
    concept_id: concept_vector_space
    kind: definition
    claim: A vector space is a set with operations of addition and scalar 
      multiplication that satisfy algebraic properties; coordinate descriptions 
      of the plane motivate this abstraction.
    preconditions:
      - A set and two proposed operations are under consideration.
      - The learner is familiar with sets and elementary arithmetic operations.
    postconditions:
      - The learner can identify addition and scalar multiplication as the two 
        operations named in the introductory characterization.
    applicability:
      - Introductory orientation before studying the formal vector-space axioms.
    positive_examples:
      - A coordinate description of a plane as motivation for a vector space.
    negative_examples: []
    non_goals:
      - This introductory facet does not enumerate the formal vector-space 
        axioms.
      - It does not establish that an arbitrary set with two operations is a 
        vector space.
    error_signatures:
      - Calling any set a vector space without checking required algebraic 
        properties.
    instructional_repairs:
      - Treat the statement as an introductory characterization and defer 
        membership judgments until the formal axioms are available.
    status: reviewed
