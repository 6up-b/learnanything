  - id: facet_a_field_is_a_set_containing_distinct_elements_0_
    title:
    aliases:
      - field of scalars
    description:
    tags: []
    concept_id: concept_scalar_fields
    kind: definition
    claim: A field is a set containing distinct elements 0 and 1 with addition 
      and multiplication satisfying the field properties; examples include the 
      rational numbers with their usual operations and the two-element field {0,
      1} in which 1 + 1 = 0.
    preconditions: []
    postconditions:
      - Scalars have a system of addition and multiplication governed by field 
        laws.
    applicability:
      - Identifying the scalar systems allowed in abstract linear algebra.
    positive_examples:
      - The rational numbers with usual arithmetic.
      - The two-element field with 1 + 1 = 0.
    negative_examples:
      - Rejecting a structure merely because its addition differs from familiar 
        real-number arithmetic.
    non_goals:
      - This facet does not reconstruct field axioms omitted from the extracted 
        unit.
    error_signatures:
      - Assuming every field must satisfy 1 + 1 ≠ 0.
    instructional_repairs:
      - Judge a candidate field by its stated operations and field properties, 
        not by familiarity alone.
