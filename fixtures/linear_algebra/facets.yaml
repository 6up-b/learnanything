  - id: facet_complex_addition_and_multiplication_obey_commuta
    title:
    aliases:
      - field-like laws of complex arithmetic
    description:
    tags: []
    concept_id: concept_complex_arithmetic_laws
    kind: proposition
    claim: Complex addition and multiplication obey commutativity and 
      associativity; 0 and 1 are their respective identities; every complex 
      number has a unique additive inverse; every nonzero complex number has a 
      unique multiplicative inverse; and multiplication distributes over 
      addition.
    preconditions:
      - Complex addition and multiplication have been defined.
    postconditions:
      - The learner can state the principal algebraic laws and preserve the 
        nonzero condition on multiplicative inverses.
    applicability:
      - Simplifying complex expressions.
      - Justifying algebraic transformations over complex numbers.
      - Preparing to interpret complex numbers as scalars in vector spaces.
    positive_examples:
      - α + β = β + α
      - (αβ)λ = α(βλ)
      - λ(α + β) = λα + λβ
    negative_examples:
      - Claiming that zero has a multiplicative inverse.
    non_goals:
      - The proposition does not claim that arbitrary operations in arbitrary 
        systems are commutative.
    error_signatures:
      - Omitting the nonzero restriction for multiplicative inverses.
      - Confusing a change of order with a change of grouping.
    instructional_repairs:
      - Name the law used at each transformation and check its hypotheses, 
        especially the nonzero condition for inversion.
    status: reviewed
