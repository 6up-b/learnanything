  - id: facet_a_linear_combination_is_a_sum_of_scalar_multiple
    title:
    aliases:
      - generated span
    description:
    tags: []
    concept_id: concept_linear_combinations_and_span
    kind: definition
    claim: A linear combination is a sum of scalar multiples of given vectors, 
      and the span of a collection is the set of all linear combinations 
      obtainable as every coefficient varies over the scalar field.
    preconditions:
      - A collection of vectors and its scalar field are specified.
    postconditions:
      - Each choice of coefficients yields one vector.
      - Allowing every coefficient identifies the entire span.
    applicability:
      - Describing reachable vectors and testing whether a collection spans a 
        space.
    positive_examples:
      - Two non-collinear vectors in three-dimensional space span a plane 
        through the origin.
      - Two non-aligned vectors in the plane span the plane.
    negative_examples:
      - A finite sample of linear combinations mistaken for the full span.
    non_goals:
      - A single displayed linear combination is not itself the span.
    error_signatures:
      - Restricting coefficients to only positive or sampled values.
      - Claiming that two non-collinear vectors span all of three-dimensional 
        space.
    instructional_repairs:
      - Let every coefficient vary over the full scalar field.
      - Distinguish one generated vector from the set of all generated vectors.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_1368e483cc6f1fca
