  - id: facet_an_element_of_a_vector_space_may_be_called_a_vec
    title:
    aliases:
      - vectors as vector-space elements
    description:
    tags: []
    concept_id: concept_vector_space
    kind: interpretation
    claim: An element of a vector space may be called a vector or a point; this 
      terminology does not require the space to have a physical geometric 
      realization.
    preconditions:
      - An element belongs to a vector space.
    postconditions:
      - The terms vector and point are interpreted as names for vector-space 
        elements.
    applicability:
      - Reading abstract vector-space language.
    positive_examples:
      - Call a function, polynomial, or coordinate tuple a vector when it is an 
        element of a vector space.
    negative_examples:
      - Assuming every vector must be a visible arrow in two or three 
        dimensions.
    non_goals:
      - This does not supply a geometric model for every vector space.
    error_signatures:
      - Restricting the word vector to arrows.
      - Inferring physical coordinates from the word point.
    instructional_repairs:
      - Use membership in the vector space, rather than visual appearance, to 
        identify vectors.
