  - id: facet_the_set_of_infinite_scalar_sequences_becomes_a_v
    title:
    aliases:
      - componentwise sequence vector space
    description:
    tags: []
    concept_id: concept_sequence_space
    kind: interpretation
    claim: The set of infinite scalar sequences becomes a vector space when 
      addition and scalar multiplication are defined componentwise; its additive
      identity is the all-zero sequence.
    preconditions:
      - All sequence entries belong to the same scalar field.
      - Corresponding coordinates are added and every coordinate is scaled by 
        the given scalar.
    postconditions:
      - The operations produce scalar sequences and the vector-space laws can be
        checked coordinate by coordinate.
    applicability:
      - Understanding and verifying sequence spaces as vector spaces.
    positive_examples:
      - Adding corresponding entries of two sequences.
      - Multiplying every entry of a sequence by one scalar.
    negative_examples:
      - Combining coordinates by inconsistent position-dependent rules without 
        verifying the axioms.
    non_goals:
      - This facet does not assert that every subset of the sequence space is a 
        vector space.
    error_signatures:
      - Using a single scalar operation on only one coordinate.
      - Identifying the additive identity as scalar 0 rather than the all-zero 
        sequence.
    instructional_repairs:
      - Write the operation at an arbitrary coordinate and verify each axiom 
        there.
      - Identify vector-space elements and scalars as different kinds of 
        objects.
