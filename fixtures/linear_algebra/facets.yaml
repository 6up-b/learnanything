  - id: facet_addition_assigns_an_element_of_the_set_to_each_o
    title:
    aliases:
      - addition and scalar multiplication contracts
    description:
    tags: []
    concept_id: concept_vector_space_operations
    kind: procedure_contract
    claim: Addition assigns an element of the set to each ordered pair of its 
      elements, while scalar multiplication assigns an element of the set to 
      each scalar-element pair.
    preconditions:
      - A set of prospective vectors is specified.
      - A scalar domain is specified for scalar multiplication.
    postconditions:
      - Both operations return elements of the prospective vector set.
    applicability:
      - Specifying the operations of a candidate vector space.
    positive_examples:
      - Componentwise operations on scalar sequences.
      - Pointwise operations on scalar-valued functions.
    negative_examples:
      - An operation whose output can leave the proposed vector set.
    non_goals:
      - Closure of the operations alone does not establish all vector-space 
        axioms.
    error_signatures:
      - Treating vector addition as an operation that may return an object 
        outside the set.
      - Confusing scalar multiplication with multiplication of two vectors.
    instructional_repairs:
      - State each operation's input types and output set explicitly.
      - Check the axioms only after the operations are well-defined.
    status: reviewed
    version: 1
