    description:
    tags: []
    concept_id: concept_vector_space
    kind: definition
    claim: An addition on a set assigns an element of the set to each ordered 
      pair of its elements, while scalar multiplication assigns an element of 
      the set to each scalar-vector pair.
    preconditions:
      - A candidate set of vectors and a scalar domain are given.
    postconditions:
      - Addition and scalar multiplication are recognized as operations with 
        different input types.
    applicability:
      - Reading the data required before vector-space axioms can be tested.
    positive_examples:
      - Addition takes two vectors; scalar multiplication takes one scalar and 
        one vector.
    negative_examples:
      - Treating scalar multiplication as an operation on two vectors.
    non_goals:
      - These operation contracts alone do not imply the vector-space axioms.
    error_signatures:
      - Ignoring closure in the set.
      - Confusing a scalar-vector input with a vector-vector input.
    instructional_repairs:
