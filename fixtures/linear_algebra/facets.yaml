  - id: facet_a_collection_is_linearly_dependent_when_a_vector
    title:
    aliases:
      - basis criterion
      - nonredundant spanning set
    description:
    tags: []
    concept_id: concept_linear_independence_and_basis
    kind: definition
    claim: A collection is linearly dependent when a vector is redundant because
      it lies in the span of the others; a basis is a linearly independent 
      collection that spans the entire vector space.
    preconditions:
      - A collection of vectors in a vector space is specified.
      - Span is understood.
    postconditions:
      - Redundancy can be tested by removing a vector and comparing spans.
      - A basis supplies enough vectors to reach the space without redundant 
        directions.
    applicability:
      - Determining whether a collection qualifies as a basis.
    positive_examples:
      - A spanning collection in which no vector lies in the span of the others.
    negative_examples:
      - A spanning collection containing a vector already generated by the 
        remaining vectors.
      - An independent collection that does not span the whole space.
    non_goals:
      - Spanning alone and independence alone are each insufficient for being a 
        basis.
    error_signatures:
      - Assuming every added vector contributes a new direction.
      - Calling any spanning collection a basis without checking independence.
    instructional_repairs:
      - Test whether removing any vector leaves the span unchanged.
      - Check spanning and linear independence as separate requirements.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_b586d38d97b594c9
