  - id: facet_to_prove_a_universal_identity_about_complex_mult
    title:
    aliases:
      - componentwise proof procedure
    description:
    tags: []
    concept_id: concept_definition_based_proof_in_complex_arithmetic
    kind: procedure_contract
    claim: To prove a universal identity about complex multiplication from its 
      definition, represent arbitrary operands as a + bi and c + di, expand both
      sides, use real-number laws to match their real and imaginary components, 
      and conclude equality.
    preconditions:
      - The operands are arbitrary complex numbers.
      - The complex multiplication rule is available.
      - The relevant real-number laws are available.
    postconditions:
      - Both sides have been reduced to matching real and imaginary components.
      - The target complex identity has been justified for arbitrary operands.
    applicability:
      - Definition-based proofs of foundational complex-arithmetic identities.
      - The worked case of commutativity of complex multiplication.
    positive_examples:
      - Expanding αβ and βα and matching components to prove αβ = βα.
    negative_examples:
      - Checking a single numerical example and claiming a universal proof.
    non_goals:
      - This procedure does not make every complex-arithmetic proof a component 
        expansion.
      - The worked argument directly proves commutativity, not all listed laws 
        at once.
    error_signatures:
      - Using particular numbers when the claim is universal.
      - Asserting equality without matching both the real and imaginary 
        components.
      - Invoking complex commutativity inside a proof intended to establish that
        same property.
    instructional_repairs:
      - Begin with arbitrary real coefficients, expand each side independently 
        from the definition, and cite only previously available real-number 
        laws.
    status: reviewed
    version: 1
