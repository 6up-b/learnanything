  - id: facet_for_a_fixed_positive_integer_n_f_n_is_the_set_of
    title:
    aliases:
      - coordinate space
      - n-dimensional coordinate space
    description:
    tags: []
    concept_id: concept_coordinate_space_f_n
    kind: definition
    claim: For a fixed positive integer n, F^n is the set of all length-n lists 
      (x_1,...,x_n) whose entries belong to F.
    preconditions:
      - n is a positive integer.
      - F denotes R or C.
    postconditions:
      - Every element of F^n has exactly n ordered scalar entries.
      - Each entry belongs to the chosen scalar system F.
    applicability:
      - Recognizing or constructing elements of a coordinate space.
      - Specializing the notation to examples such as C^4.
    positive_examples:
      - C^4 consists of four-entry lists of complex numbers.
    negative_examples:
      - A list with a number of entries different from n is not an element of 
        F^n.
    non_goals:
      - The definition does not require a physical visualization of the space.
    error_signatures:
      - Constructing an element with fewer or more than n coordinates.
      - Mixing coordinate entries from incompatible scalar systems.
    instructional_repairs:
      - Count the entries and verify that every entry belongs to the same chosen
        F.
