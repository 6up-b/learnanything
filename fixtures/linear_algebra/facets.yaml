  - id: facet_a_complex_number_has_the_form_a_bi_with_a_b_real
    title:
    aliases:
      - standard form of a complex number
      - real-imaginary representation
    description:
    tags: []
    concept_id: concept_complex_numbers
    kind: definition
    claim: A complex number has the form a + bi with a,b real, and the set of 
      all such numbers is denoted C.
    preconditions:
      - The learner can recognize real numbers and ordered pairs of real values.
    postconditions:
      - The learner can interpret a and b as the real coefficients in a complex 
        number.
      - The learner can recognize a + bi as standard complex-number form.
    applicability:
      - Representing and interpreting complex numbers.
    positive_examples:
      - 2 + 3i
      - -4 + 0i
      - 0 + 5i
    negative_examples: []
    non_goals:
      - This definition alone does not specify complex addition or 
        multiplication.
    error_signatures:
      - Treating a and b as non-real coefficients without changing the number 
        system.
      - Omitting the imaginary unit from the second component.
    instructional_repairs:
      - Rewrite the number explicitly as a + bi and identify both real 
        coefficients.
