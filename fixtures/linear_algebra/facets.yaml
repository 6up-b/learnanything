  - id: facet_in_f_n_the_zero_vector_is_the_length_n_list_0_0_
    title:
    aliases:
      - type-aware zero notation
      - zero vector in F^n
    description:
    tags: []
    concept_id: concept_coordinate_vector_operations
    kind: interpretation
    claim: In F^n, the zero vector is the length-n list (0, ..., 0). Because the
      symbol 0 is overloaded, its type must be inferred from the surrounding 
      expression; in x + 0 = x with x in F^n, it denotes the zero vector.
    preconditions:
      - The ambient coordinate space and the operand types are known.
    postconditions:
      - Zero notation is interpreted as the object that makes the expression 
        type-consistent.
    applicability:
      - Expressions using 0 in both a scalar field and a coordinate space.
    positive_examples:
      - Interpret 0 in x + 0 = x as the zero vector when x belongs to F^n.
    negative_examples:
      - Interpreting the second operand of x + 0 as scalar zero when 
        vector-scalar addition has not been defined.
    non_goals:
      - This does not identify scalar zero and the zero vector as the same kind 
        of object.
    error_signatures:
      - Assuming every occurrence of 0 is a scalar.
      - Ignoring the domain of the addition operation.
    instructional_repairs:
      - Identify the type of each neighboring term and select the zero object 
        belonging to the required domain.
