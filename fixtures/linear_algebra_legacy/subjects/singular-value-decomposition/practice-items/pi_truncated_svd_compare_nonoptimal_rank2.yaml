prompt: A matrix A has singular values 10, 6, 2, and 1. A student forms a rank-2
  approximation B by keeping the singular directions corresponding to 10 and 2, 
  instead of 10 and 6. Compute ||A - B||_F and compare it with the 
  Frobenius-norm error of the best rank-2 approximation. What does this show?
expected_answer: If B keeps 10 and 2, then the discarded singular values are 6 
  and 1, so ||A - B||_F = sqrt(6^2 + 1^2) = sqrt(37). The best rank-2 
  approximation discards 2 and 1, so its error is sqrt(2^2 + 1^2) = sqrt(5). 
  Since sqrt(37) > sqrt(5), this shows that keeping singular directions other 
  than the top k ones is not optimal in Frobenius norm.
difficulty: 0.58
difficulty_source: llm_estimate
tags:
