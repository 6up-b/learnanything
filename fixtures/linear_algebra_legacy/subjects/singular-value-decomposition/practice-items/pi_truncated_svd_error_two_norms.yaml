evidence_facets:
  - applies_tail_sum_formula
  - distinguishes_frobenius_vs_spectral_error
evidence_weights: {}
prompt: A matrix A has singular values 10, 6, 2, and 1. What are the 
  Frobenius-norm error and the spectral-norm error of the best rank-2 
  approximation to A? Briefly justify each value.
expected_answer: The best rank-2 approximation keeps singular values 10 and 6. 
  The Frobenius-norm error is sqrt(2^2 + 1^2) = sqrt(5). The spectral-norm error
  is 2, the largest discarded singular value.
difficulty: 0.52
difficulty_source: llm_estimate
tags:
  - computation
  - frobenius-norm
  - spectral-norm
  - best-rank-k
hints:
  - For the best rank-k approximation, keep the k largest singular values.
  - Frobenius error uses the square root of the sum of squares of discarded 
    singular values.
  - Spectral error uses the largest discarded singular value.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
  mastery_alpha_dampening_by_hint: {}
grading_rubric:
  max_points: 4
  criteria:
    - id: crit_tail_identified
      points: 1.0
      description: Identifies that the best rank-2 approximation discards 
        singular values 2 and 1.
    - id: crit_frobenius_value
      points: 2.0
      description: Computes the Frobenius error correctly as sqrt(5).
    - id: crit_spectral_value
      points: 1.0
      description: States the spectral error correctly as 2.
  fatal_errors:
    - id: fatal_keeps_wrong_singular_values
      description: Uses a rank-2 approximation that does not keep the two 
        largest singular values.
      max_grade: 1
