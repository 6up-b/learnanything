schema_version: 1
id: pi_svd_geometry_unit_circle_axes
learning_object_id: lo_svd_geometric_interpretation
subjects:
  - singular-value-decomposition
practice_mode: constructed_response
attempt_types_allowed:
  - independent_attempt
  - dont_know
  - open_text
evidence_facets:
  - interpret_vt_geometrically
  - interpret_sigma_geometrically
  - interpret_u_geometrically
  - connect_singular_values_to_ellipse_axes
evidence_weights: {}
prompt: A 2 x 2 matrix has SVD A = UΣV^T with singular values 3 and 0.5. 
  Describe the image of the unit circle after applying V^T, then Σ, then U.
expected_answer: V^T rotates or reflects the unit circle without changing its 
  shape. Σ turns it into an axis-aligned ellipse with semiaxis lengths 3 and 
  0.5. U then rotates or reflects that ellipse into its final orientation.
difficulty: 0.56
difficulty_source: llm_estimate
tags:
  - svd
  - geometry
  - unit-circle
  - ellipse
hints:
  - Orthogonal matrices preserve lengths and angles.
  - The diagonal entries of Σ determine the principal semiaxis lengths after 
    stretching.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
  mastery_alpha_dampening_by_hint: {}
grading_rubric:
  max_points: 4
  criteria:
    - id: c_vt_action
      points: 1.0
      description: Explains that V^T changes coordinates by a rotation or 
        reflection without changing lengths.
    - id: c_sigma_action
      points: 2.0
      description: Explains that Σ stretches the circle into an axis-aligned 
        ellipse with semiaxis lengths 3 and 0.5.
    - id: c_u_action
      points: 1.0
      description: Explains that U rotates or reflects the ellipse into its 
        final orientation.
  fatal_errors:
    - id: fe_claim_sigma_rotates
      description: Attributes the geometric rotation/reflection role to Σ 
        instead of U or V^T.
      max_grade: 1
