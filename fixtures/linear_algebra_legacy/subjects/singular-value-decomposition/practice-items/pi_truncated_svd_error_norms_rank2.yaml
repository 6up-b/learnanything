schema_version: 1
id: pi_truncated_svd_error_norms_rank2
learning_object_id: lo_truncated_svd_error_norms
subjects:
  - singular-value-decomposition
practice_mode: constructed_response
attempt_types_allowed:
  - independent_attempt
  - dont_know
  - open_text
evidence_facets:
  - identify_retained_vs_discarded_singular_values
  - compute_spectral_error_from_sigma
  - compute_frobenius_error_from_sigma
  - justify_with_truncated_svd
evidence_weights: {}
prompt: A matrix has singular values 10, 6, 2, and 1. What are the spectral-norm
  error and Frobenius-norm error of the best rank-2 approximation? Briefly 
  justify each from truncated SVD.
expected_answer: Spectral-norm error = 2. Frobenius-norm error = sqrt(2^2 + 1^2)
  = sqrt(5). The best rank-2 approximation keeps the two largest singular values
  and the error is determined by the discarded singular values.
difficulty: 0.59
difficulty_source: llm_estimate
tags:
  - svd
  - truncated-svd
  - norms
hints:
  - For the best rank-k approximation, keep the k largest singular values.
  - The spectral error uses the largest discarded singular value.
  - The Frobenius error uses the square root of the sum of squares of discarded 
    singular values.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
  mastery_alpha_dampening_by_hint: {}
grading_rubric:
  max_points: 4
  criteria:
    - id: c_identify_discarded_values
      points: 1.0
      description: Identifies that the discarded singular values are 2 and 1 for
        the best rank-2 approximation.
    - id: c_spectral_error
      points: 1.0
      description: States that the spectral-norm error is 2.
    - id: c_frobenius_error
      points: 1.0
      description: States that the Frobenius-norm error is sqrt(5).
    - id: c_justification
      points: 1.0
      description: Justifies the answers by referencing truncated SVD or the 
        norm formulas based on discarded singular values.
  fatal_errors:
    - id: fe_swap_norms
      description: Swaps the spectral and Frobenius error rules.
      max_grade: 1
    - id: fe_keep_wrong_values
      description: Uses retained singular values instead of discarded singular 
        values to compute the error.
      max_grade: 1
