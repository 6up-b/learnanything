schema_version: 1
id: pi_best_rank1_error
learning_object_id: lo_truncated_svd_best_rank_k
subjects:
  - singular-value-decomposition
practice_mode: constructed_response
attempt_types_allowed:
  - open_text
evidence_facets:
  - truncated-svd
  - frobenius-error
  - best-rank-k
evidence_weights: {}
prompt: A matrix has singular values 9, 4, and 1. What is the Frobenius-norm 
  error of the best rank-1 approximation? Briefly justify your answer.
expected_answer: The error is sqrt(4^2 + 1^2) = sqrt(17), because the squared 
  Frobenius error of the best rank-1 approximation is the sum of squares of the 
  discarded singular values.
difficulty: 0.53
difficulty_source: llm_estimate
tags:
  - application
  - low-rank-approximation
hints:
  - For Frobenius error, square the discarded singular values and add them.
  - Rank 1 means you keep only one singular value.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
  mastery_alpha_dampening_by_hint: {}
grading_rubric:
  max_points: 4
  criteria:
    - id: c_discarded_values
      points: 1.0
      description: Identifies that the best rank-1 approximation discards 
        singular values 4 and 1.
    - id: c_frobenius_formula
      points: 1.0
      description: Uses the Frobenius-error formula based on the square root of 
        the sum of squares of discarded singular values.
    - id: c_numeric_answer
      points: 1.0
      description: Computes the error as sqrt(17).
    - id: c_justification
      points: 1.0
      description: Briefly justifies the result using truncated SVD or 
        Eckart-Young style reasoning.
  fatal_errors:
    - id: fe_spectral_instead_of_frobenius
      description: Gives 4 by using the spectral-norm error rule instead of the 
        Frobenius-norm rule.
      max_grade: 1
    - id: fe_linear_sum
      description: Adds the discarded singular values to get 5 instead of taking
        the square root of the sum of squares.
      max_grade: 1
