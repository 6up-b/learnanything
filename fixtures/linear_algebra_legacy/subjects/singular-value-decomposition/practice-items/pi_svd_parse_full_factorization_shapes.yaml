schema_version: 1
id: pi_svd_parse_full_factorization_shapes
learning_object_id: lo_svd_parse_factorization
subjects:
  - singular-value-decomposition
practice_mode: constructed_response
attempt_types_allowed:
  - independent_attempt
  - dont_know
  - open_text
evidence_facets:
  - identify_svd_factors
  - distinguish_left_and_right_singular_vectors
  - match_factor_shapes
evidence_weights: {}
prompt: For a 4 x 3 matrix A with full SVD A = UΣV^T, state what information is 
  contained in U, Σ, and V^T, and give the size of Σ.
expected_answer: U contains the left singular vectors and is 4 x 4 orthogonal; Σ
  is 4 x 3 with nonnegative singular values on its diagonal; V^T is the 
  transpose of the 3 x 3 orthogonal matrix of right singular vectors.
difficulty: 0.35
difficulty_source: llm_estimate
tags:
  - svd
  - factorization
  - matrix-shapes
hints:
  - In the full SVD of an m x n matrix, U is m x m and V is n x n.
  - The singular values appear in Σ, not in U or V.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
  mastery_alpha_dampening_by_hint: {}
grading_rubric:
  max_points: 4
  criteria:
    - id: c_u_role
      points: 1.0
      description: Correctly identifies U as containing left singular vectors.
    - id: c_sigma_role
      points: 1.0
      description: Correctly identifies Σ as containing the singular values on 
        its diagonal.
    - id: c_vt_role
      points: 1.0
      description: Correctly identifies V^T as coming from the right singular 
        vectors.
    - id: c_sigma_size
      points: 1.0
      description: Gives the full-SVD size of Σ as 4 x 3.
  fatal_errors:
    - id: fe_swap_left_right
      description: Swaps left and right singular vectors between U and V^T.
      max_grade: 2
provenance:
  origin: codex_proposal
  source_refs:
