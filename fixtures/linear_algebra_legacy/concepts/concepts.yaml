schema_version: 1
concepts:
  concept_singular_values_vectors:
    title: Singular values and singular vectors
    type: concept
    aliases:
      - left singular vectors
      - right singular vectors
    description: Right singular vectors give principal input directions, left 
      singular vectors give corresponding output directions, and singular values
      measure the associated stretching.
    tags:
      - singular-value-decomposition
      - singular-values
      - singular-vectors
    created_at: '2026-05-21T20:51:09Z'
    updated_at: '2026-05-21T20:51:09Z'
    id: concept_singular_values_vectors
  concept_svd_factorization:
    title: Singular value decomposition factorization
    type: concept
    aliases:
      - SVD
      - A = UΣV^T
    description: Any real matrix can be expressed as a product of orthogonal 
      factors and a diagonal matrix of nonnegative singular values.
    tags:
      - singular-value-decomposition
      - matrix-factorization
      - core-idea
    created_at: '2026-05-21T20:51:10Z'
    updated_at: '2026-05-21T20:51:10Z'
    id: concept_svd_factorization
  concept_svd_geometry:
    title: Geometric interpretation of SVD
    type: concept
    aliases:
      - rotation-stretch-rotation view
    description: SVD can be understood as a change of input basis, axis-aligned 
      scaling, and a change of output basis.
    tags:
      - singular-value-decomposition
      - geometry
      - interpretation
    created_at: '2026-05-21T20:51:10Z'
    updated_at: '2026-05-21T20:51:10Z'
    id: concept_svd_geometry
  concept_truncated_svd:
    title: Truncated SVD and best low-rank approximation
    type: concept
    aliases:
      - rank-k approximation
      - Eckart-Young
    description: Keeping only the largest k singular values and their singular 
      vectors gives the optimal rank-k approximation under the spectral and 
      Frobenius norms.
    tags:
      - singular-value-decomposition
      - low-rank-approximation
      - applications
    created_at: '2026-05-21T20:51:10Z'
    updated_at: '2026-05-21T20:51:10Z'
    id: concept_truncated_svd
